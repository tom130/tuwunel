name: Fork CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: fork-ci-${{github.ref}}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: DeterminateSystems/nix-installer-action@main

    - uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Build aarch64 static binary
      run: nix build .#static-aarch64-linux-musl --print-build-logs

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build and push Docker image
      run: |
        cp result/bin/tuwunel tuwunel-bin
        cat > Dockerfile.fork <<'DOCKERFILE'
        FROM arm64v8/debian:testing-slim
        RUN apt-get update && apt-get install -y --no-install-recommends tini ca-certificates && rm -rf /var/lib/apt/lists/*
        COPY tuwunel-bin /usr/local/bin/tuwunel
        ENTRYPOINT ["tini", "--"]
        CMD ["tuwunel"]
        DOCKERFILE
        TAG="ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
        docker buildx create --use
        docker buildx build --platform linux/arm64 -f Dockerfile.fork -t "$TAG" --push .
