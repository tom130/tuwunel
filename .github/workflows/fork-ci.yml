name: Fork CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: fork-ci-${{github.ref}}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: DeterminateSystems/nix-installer-action@main

    - uses: DeterminateSystems/magic-nix-cache-action@main

    - name: cargo check
      run: nix develop -c cargo check --workspace 2>&1

    - name: cargo clippy
      run: nix develop -c cargo clippy --workspace 2>&1

    - name: cargo test
      run: nix develop -c cargo test --workspace 2>&1
